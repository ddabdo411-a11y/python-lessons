.sidebar-search{padding:12px}

.lesson-list{padding:8px}
.lesson-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:10px;cursor:pointer;transition:all .2s;margin-bottom:2px;font-size:14px;touch-action:manipulation}

.main{padding:16px 16px 100px;max-width:800px;margin:0 auto}
.lesson-header{margin-bottom:16px}
.lesson-header .icon{font-size:40px;display:block;margin-bottom:6px}
.lesson-header h2{font-size:22px;color:#fff;margin-bottom:4px}
.lesson-header .count{font-size:13px;color:#888}
.lesson-progress{height:4px;background:#2a2a4a;border-radius:4px;margin-bottom:20px;overflow:hidden}
.lesson-progress .fill{height:100%;background:#e94560;border-radius:4px;transition:width .4s}
.card{background:#1a1a2e;border-radius:14px;padding:18px;margin-bottom:14px;border:1px solid #2a2a4a}

.card ul li{font-size:14px;line-height:1.8;color:#ccc;margin-bottom:4px}

.code-block{background:#0a0a15;border-radius:12px;margin:12px 0;overflow:hidden;border:1px solid #2a2a4a}
.code-header{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:#12122a;font-size:12px;color:#888}

.copy-btn{background:#2a2a4a;border:none;color:#ccc;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px;transition:all .2s;touch-action:manipulation}
.copy-btn:hover{background:#3a3a5a;color:#fff}
.copy-btn.copied{background:#27ae60;color:#fff}
.code-block pre{margin:0;padding:14px;overflow-x:auto;font-size:13px;line-height:1.7;direction:ltr;text-align:left}

.run-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border:none;border-radius:10px;background:#e94560;color:#fff;font-size:15px;font-weight:bold;cursor:pointer;transition:all .2s;margin:12px 0;touch-action:manipulation}

.output-box{background:#0a0a15;border-radius:10px;padding:14px;min-height:40px;font-family:'Consolas','Courier New',monospace;font-size:13px;direction:ltr;text-align:left;white-space:pre-wrap;border:1px solid #2a2a4a;color:#fab387;display:none;margin-top:-8px;margin-bottom:12px}

.nav-btn.prev:hover{background:#3a3a5a}
.nav-btn.next{background:#e94560;color:#fff}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#e0e0e0;padding:10px 24px;border-radius:10px;border:1px solid #2a2a4a;font-size:13px;z-index:300;display:none;animation:fadeIn .3s;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.toast.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:#1a1a2e;border-radius:12px;padding:14px;text-align:center;border:1px solid #2a2a4a}
.stat-card .num{font-size:22px;font-weight:bold;color:#e94560}
.stat-card .label{font-size:12px;color:#888;margin-top:4px}
.splash{position:fixed;inset:0;background:#0f0f1a;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s}
.splash.hide{opacity:0;pointer-events:none}
.splash .logo{font-size:64px;margin-bottom:12px}

.splash .loader::after{content:'';position:absolute;top:0;left:-40px;width:40px;height:100%;background:#e94560;border-radius:4px;animation:load 1.5s infinite}
@keyframes load{0%{left:-40px}100%{left:100%}}
@media(min-width:768px){.main{padding:24px 24px 100px}.lesson-header h2{font-size:28px}.card{padding:24px}}
@media(max-width:400px){.topbar h1{font-size:15px}.lesson-item{font-size:13px;padding:10px 12px}.card{padding:14px}.lesson-header .icon{font-size:32px}}

let currentLesson = 0;
const totalLessons = lessons.length;

// ======================== عرض الدروس ========================
function renderLesson(index) {
  const lesson = lessons[index];
  const main = document.getElementById("mainContent");
  let html = `
    <div class="lesson-header">
      <span class="icon">${lesson.icon}</span>
      <h2>${lesson.title}</h2>
      <span class="count">الدرس ${index + 1} من ${totalLessons}</span>
    </div>
    <div class="lesson-progress"><div class="fill" style="width:${((index + 1) / totalLessons) * 100}%"></div></div>
    <div class="stats-grid">
      <div class="stat-card"><div class="num">${totalLessons}</div><div class="label">إجمالي الدروس</div></div>
      <div class="stat-card"><div class="num">${index + 1}</div><div class="label">الدرس الحالي</div></div>
      <div class="stat-card"><div class="num">${Math.round(((index + 1) / totalLessons) * 100)}%</div><div class="label">التقدم</div></div>
    </div>`;

  for (const block of lesson.content) {
    if (block.type === "info") {
      html += `<div class="card"><div class="card-title">${block.title}</div>${block.text}</div>`;
    } else if (block.type === "contact") {
      html += `<div class="card" style="border:2px solid #25D366;border-radius:14px">${block.text}</div>`;
    } else if (block.type === "code") {
      const escapedCode = block.code.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      const dataCode = block.code.replace(/`/g,"\\`").replace(/\\n/g,"\\\\n").replace(/\n/g,"\\n");
      const dataOutput = block.output.replace(/`/g,"\\`").replace(/\\n/g,"\\\\n").replace(/\n/g,"\\n");
      const infoHtml = block.info ? `<div style="margin-bottom:4px;font-size:13px;color:#888">${block.info}</div>` : "";
      html += `
        <div class="card">
          ${infoHtml}
          <div class="code-block">
            <div class="code-header"><span class="lang">Python</span><button class="copy-btn" onclick="copyCode(this)">📋 نسخ</button></div>
            <pre><code>${escapedCode}</code></pre>
          </div>
          <button class="run-btn" onclick='showOutput(this, \`${dataOutput}\')'>▶ تشغيل الكود</button>
          <div class="output-box"></div>
        </div>`;
    }
  }

  html += `
    <div class="nav-buttons">
      <button class="nav-btn prev" onclick="goLesson(${index - 1})" ${index === 0 ? "disabled" : ""}>◀ السابق</button>
      <button class="nav-btn next" onclick="goLesson(${index + 1})" ${index === totalLessons - 1 ? "disabled" : ""}>التالي ▶</button>
    </div>`;

  main.innerHTML = html;
  document.getElementById("lessonCounter").textContent = `${index + 1} / ${totalLessons}`;
  updateSidebarActive(index);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function goLesson(index) {
  if (index < 0 || index >= totalLessons) return;
  currentLesson = index;
  renderLesson(index);
}

function toggleSidebar() {
  const s = document.getElementById("sidebar");
  const o = document.getElementById("overlay");
  s.classList.toggle("open");
  o.classList.toggle("show");
}

function updateSidebarActive(index) {
  document.querySelectorAll(".lesson-item").forEach((el, i) => {
    el.classList.toggle("active", i === index);
  });
}

function filterLessons() {
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  document.querySelectorAll(".lesson-item").forEach(el => {
    const text = el.textContent.toLowerCase();
    el.style.display = (!q || text.includes(q)) ? "flex" : "none";
  });
}

// ======================== القائمة الجانبية ========================
function buildSidebar() {
  const list = document.getElementById("lessonList");
  list.innerHTML = lessons.map((l, i) => `
    <div class="lesson-item ${i === 0 ? "active" : ""}" onclick="goLesson(${i}); toggleSidebar()">
      <span class="num">${i + 1}</span>
      <span class="icon">${l.icon}</span>
      <span>${l.title}</span>
    </div>
  `).join("");
}

// ======================== تشغيل الكود وعرض المخرجات ========================
function showOutput(btn, output) {
  const outputBox = btn.nextElementSibling;
  outputBox.className = "output-box show";
  outputBox.textContent = output || "✅ تم التنفيذ بنجاح";
}

function copyCode(btn) {
  const pre = btn.closest(".code-block").querySelector("pre code");
  const text = pre.textContent;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = "✅ تم";
      btn.classList.add("copied");
      setTimeout(() => { btn.textContent = "📋 نسخ"; btn.classList.remove("copied"); }, 1500);
      showToast("📋 تم نسخ الكود!");
    });
  } else {
    const ta = document.createElement("textarea");
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    showToast("📋 تم نسخ الكود!");
  }
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

// ======================== التهيئة ========================
buildSidebar();
renderLesson(0);
setTimeout(() => { document.getElementById("splash").classList.add("hide"); }, 1200);

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>
